services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus_operacional
    ports:
      - "5432:5432"
    volumes:
      - nexus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_operacional"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nexus-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3333
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus_operacional?schema=public
      JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
      JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
      WEB_ORIGIN: http://localhost:3000
    ports:
      - "3333:3333"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nexus-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333/api
    ports:
      - "3000:3000"

volumes:
  nexus-postgres-data:
