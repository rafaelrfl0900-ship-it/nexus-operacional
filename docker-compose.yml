version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_operacional}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nexus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_operacional}"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3333}
      DATABASE_URL: ${DATABASE_URL:-postgresql://nexus:nexus@postgres:5432/nexus_operacional?schema=public}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-with-a-long-random-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-with-a-long-random-refresh-secret}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      BACKUP_DIR: ${BACKUP_DIR:-./backups}
    ports:
      - "${API_PORT:-3333}:3333"
    volumes:
      - nexus-backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3333/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 8

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333/api}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  nexus-postgres-data:
  nexus-backups:
