server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    return 302 /nexus-operacional/;
  }

  location /nexus-operacional/ {
    try_files $uri $uri/ $uri/index.html /nexus-operacional/404.html;
  }

  location /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }
}
